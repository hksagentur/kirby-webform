type: group
fields:
  form:
    type: select
    label:
      *: hksagentur.webform.form.label
    help:
      *: hksagentur.webform.form.help
    required: true
    options:
      type: query
      query: kirby.collection('forms')
      text: "{{ item.label }} ({{ item.id }})"
      value: "{{ item.id }}"
  subject:
    type: text
    label:
      *: hksagentur.webform.subject.label
    help:
      *: hksagentur.webform.subject.help
  recipient:
    type: email
    label:
      *: hksagentur.webform.recipient.label
    help:
      *: hksagentur.webform.recipient.help
  sender:
    type: email
    label:
      *: hksagentur.webform.sender.label
    help:
      *: hksagentur.webform.sender.help
